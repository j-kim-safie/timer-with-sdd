name: "新機能"
description: "新しい機能をリクエストします"
labels: ["sdd:analyze"]
body:
  - type: markdown
    attributes:
      value: "## 新機能リクエスト"

  - type: textarea
    id: background
    attributes:
      label: "背景"
      description: "なぜこの機能が必要ですか？"
      value: |
        - 問題 / 動機:
        - ユーザーフィードバック: (あれば)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "機能説明"
      description: "何を作る必要がありますか？"
      value: |
        - 概要:
        - 詳細説明: (具体的な動作フロー、使用シナリオ)
        - 対象画面: (どの画面に追加？新しい画面？)
        - 参考資料: (スクリーンショット、デザインモック、類似アプリの例など)
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: "完了基準 (Definition of Done)"
      description: "この機能が完了とみなされる基準は？"
      value: |
        - [ ] 基準 1:
        - [ ] 基準 2:
        - [ ] 基準 3:
    validations:
      required: true
